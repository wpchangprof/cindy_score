<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>妞妞小朋友好棒棒集點星 - 自訂升級版</title>
    <style>
        /* 基礎重設與 Stripe/極簡風格融合 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f6f9fc;
            color: #333333;
            margin: 0;
            padding: 20px 16px;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            padding: 30px 24px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(50, 50, 93, 0.05), 0 5px 15px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        h2 {
            margin: 0 0 10px 0;
            color: #111111;
            font-size: 22px;
            font-weight: 700;
        }

        /* 大字體點數顯示區 */
        .score-display {
            background: #0a2540;
            color: #635bff;
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
        }

        .score-title {
            font-size: 14px;
            color: #adbdcc;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .score-number {
            font-size: 80px;
            font-weight: 900;
            color: #00d4b6;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        /* 備註與自訂欄位區 */
        .form-section {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-section label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #6a7c92;
            margin-bottom: 8px;
        }

        .custom-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e6ebf1;
            border-radius: 10px;
            font-size: 16px;
            background-color: #f8fafc;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .custom-input:focus {
            border-color: #635bff;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(99, 91, 255, 0.1);
        }

        /* 自訂加減點區塊 */
        .custom-action-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-custom {
            flex: 1;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            transition: all 0.15s;
        }

        .btn-custom-plus { background: #24b47e; }
        .btn-custom-minus { background: #e25950; }
        .btn-custom:active { transform: scale(0.97); opacity: 0.9; }

        /* 分隔線 */
        .divider {
            height: 1px;
            background-color: #e6ebf1;
            margin: 25px 0 20px 0;
        }

        /* 快捷按鈕群組 */
        .btn-group {
            margin-bottom: 15px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .btn {
            flex: 1;
            padding: 15px 0;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            color: white;
        }

        /* 快捷加點按鈕風格 (綠色系漸層) */
        .btn-plus {
            background: linear-gradient(180deg, #24b47e 0%, #1da16f 100%);
            box-shadow: 0 4px 6px rgba(36, 180, 126, 0.2);
        }
        .btn-plus:active {
            transform: scale(0.95);
            background: #1da16f;
        }

        /* 快捷扣點按鈕風格 (橘紅系漸層) */
        .btn-minus {
            background: linear-gradient(180deg, #e25950 0%, #d6453b 100%);
            box-shadow: 0 4px 6px rgba(226, 89, 80, 0.2);
        }
        .btn-minus:active {
            transform: scale(0.95);
            background: #d6453b;
        }

        /* 歷史紀錄區 */
        .history-section {
            text-align: left;
            margin-top: 30px;
            border-top: 1px solid #e6ebf1;
            padding-top: 20px;
        }

        .history-title {
            font-size: 15px;
            font-weight: 700;
            color: #334155;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-history {
            font-size: 12px;
            color: #94a3b8;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
        }

        .clear-history:hover { color: #ef4444; }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .history-item:last-child { border-bottom: none; }

        .hist-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .hist-reason {
            color: #1e293b;
            font-weight: 600;
        }

        .hist-time {
            color: #94a3b8;
            font-size: 11px;
        }

        .hist-change {
            font-weight: 700;
            font-size: 15px;
        }

        .change-plus { color: #24b47e; }
        .change-minus { color: #e25950; }
    </style>
</head>
<body>

    <div class="container">
        <h2>張語芯(妞寶)集點板</h2>
        
        <div class="score-display">
            <div class="score-title">CURRENT POINTS</div>
            <div class="score-number" id="totalPoints">0</div>
        </div>

        <div class="form-section">
            <label for="noteInput">為什麼調整點數？（選填備註）</label>
            <input type="text" id="noteInput" class="custom-input" placeholder="例如：幫忙洗碗、吵架..." autocomplete="off">
        </div>

        <div class="form-section">
            <label for="customAmountInput">自訂調整點數</label>
            <input type="number" id="customAmountInput" class="custom-input" placeholder="請輸入點數（例如: 10, 20...）" min="1">
            <div class="custom-action-row">
                <button class="btn-custom btn-custom-plus" onclick="adjustCustomPoints(true)">+ 自訂加點</button>
                <button class="btn-custom btn-custom-minus" onclick="adjustCustomPoints(false)">- 自訂扣點</button>
            </div>
        </div>

        <div class="divider"></div>

        <div class="btn-group">
            <div class="btn-row">
                <button class="btn btn-plus" onclick="adjustPoints(1)">+1</button>
                <button class="btn btn-plus" onclick="adjustPoints(3)">+3</button>
                <button class="btn btn-plus" onclick="adjustPoints(5)">+5</button>
            </div>
            <div class="btn-row">
                <button class="btn btn-minus" onclick="adjustPoints(-1)">-1</button>
                <button class="btn btn-minus" onclick="adjustPoints(-3)">-3</button>
                <button class="btn btn-minus" onclick="adjustPoints(-5)">-5</button>
            </div>
        </div>

        <div class="history-section">
            <div class="history-title">
                <span>歷史變更紀錄</span>
                <button class="clear-history" onclick="clearAll()">清除所有資料</button>
            </div>
            <ul class="history-list" id="historyList">
                </ul>
        </div>
    </div>

    <script>
        let points = parseInt(localStorage.getItem('kid_points')) || 0;
        let logs = JSON.parse(localStorage.getItem('kid_logs')) || [];

        const totalPointsEl = document.getElementById('totalPoints');
        const noteInputEl = document.getElementById('noteInput');
        const customAmountInputEl = document.getElementById('customAmountInput');
        const historyListEl = document.getElementById('historyList');

        function render() {
            totalPointsEl.innerText = points;
            
            historyListEl.innerHTML = '';
            logs.forEach(log => {
                const li = document.createElement('li');
                li.className = 'history-item';
                
                const isPlus = log.amount > 0;
                const sign = isPlus ? '+' : '';
                const changeClass = isPlus ? 'change-plus' : 'change-minus';

                li.innerHTML = `
                    <div class="hist-info">
                        <span class="hist-reason">${log.reason}</span>
                        <span class="hist-time">${log.time}</span>
                    </div>
                    <span class="hist-change ${changeClass}">${sign}${log.amount}</span>
                `;
                historyListEl.appendChild(li);
            });
        }

        // 處理自訂增減點數的專屬函式
        function adjustCustomPoints(isAddition) {
            const val = parseInt(customAmountInputEl.value);
            
            // 防呆機制：沒輸入或小於等於 0 則不理會
            if (isNaN(val) || val <= 0) {
                alert("請輸入大於 0 的有效自訂點數！");
                return;
            }

            // 根據點擊的按鈕決定加或減
            const finalAmount = isAddition ? val : -val;
            adjustPoints(finalAmount);
            
            // 新增成功後清空自訂輸入框
            customAmountInputEl.value = "";
        }

        // 核心調點與儲存邏輯
        function adjustPoints(amount) {
            points += amount;
            
            let reason = noteInputEl.value.trim();
            if (reason === "") {
                reason = amount > 0 ? "表現良好獎勵" : "不當表現扣點";
            }

            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            logs.unshift({
                amount: amount,
                reason: reason,
                time: timeStr
            });

            if (logs.length > 50) logs.pop();

            localStorage.setItem('kid_points', points);
            localStorage.setItem('kid_logs', JSON.stringify(logs));

            noteInputEl.value = "";   
            render();
        }

        function clearAll() {
            if (confirm("確定要重設點數並清除所有歷史紀錄嗎？")) {
                points = 0;
                logs = [];
                localStorage.removeItem('kid_points');
                localStorage.removeItem('kid_logs');
                render();
            }
        }

        render();
    </script>
</body>
</html>
