<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的好棒棒集點星 ✨</title>
    <style>
        /* 延續原先的高質感 Stripe 風格，但移除所有操作元件 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f6f9fc;
            color: #333333;
            margin: 0;
            padding: 40px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            padding: 40px 24px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(50, 50, 93, 0.05), 0 5px 15px rgba(0, 0, 0, 0.03);
            text-align: center;
            position: relative;
        }

        h2 {
            margin: 0 0 5px 0;
            color: #111111;
            font-size: 24px;
            font-weight: 700;
        }

        .subtitle {
            color: #6a7c92;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* 載入中遮罩 */
        .loading-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            color: #635bff;
            z-index: 10;
            font-size: 16px;
        }

        /* 超大字體點數顯示區 */
        .score-display {
            background: #0a2540;
            color: #635bff;
            padding: 35px 20px;
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
        }

        .score-title {
            font-size: 13px;
            color: #00d4b6;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .score-number {
            font-size: 96px;
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 10px rgba(0,212,182,0.3);
        }

        /* 唯讀版歷史紀錄區 */
        .history-section {
            text-align: left;
            margin-top: 30px;
            border-top: 1px solid #e6ebf1;
            padding-top: 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .history-title { font-size: 15px; font-weight: 700; color: #334155; }
        
        .btn-refresh {
            font-size: 13px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 6px 12px;
            border-radius: 8px;
            color: #635bff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-refresh:active { transform: scale(0.95); }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 240px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .history-item:last-child { border-bottom: none; }
        .hist-info { display: flex; flex-direction: column; }
        .hist-reason { color: #1e293b; font-weight: 600; }
        .hist-time { color: #94a3b8; font-size: 11px; margin-top: 2px; }
        .hist-change { font-weight: 700; font-size: 15px; }
        .change-plus { color: #24b47e; }
        .change-minus { color: #e25950; }
        
        .footer-text {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loading-overlay" id="loadingOverlay">正在同步最新點數...</div>

        <h2>我的好棒棒集點星 ✨</h2>
        <div class="subtitle">今天也要繼續加油喔！</div>
        
        <div class="score-display">
            <div class="score-title">🏆 目前累積點數</div>
            <div class="score-number" id="totalPoints">0</div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <div class="history-title">我的表現紀錄</div>
                <button class="btn-refresh" onclick="fetchFromCloud()">🔄 重新整理</button>
            </div>
            <ul class="history-list" id="historyList"></ul>
        </div>
        
        <div class="footer-text">💡 本網頁僅供點數查看，調整請洽爸爸媽媽。</div>
    </div>

    <script>
        // 自動沿用您之前的 SheetDB API 網址
        const API_URL = "https://sheetdb.io/api/v1/eljpf0mv80npd";

        let points = 0;
        let logs = [];
        
        const totalPointsEl = document.getElementById('totalPoints');
        const historyListEl = document.getElementById('historyList');
        const loadingOverlay = document.getElementById('loadingOverlay');

        function showLoading(status) {
            loadingOverlay.style.display = status ? 'flex' : 'none';
        }

        function renderUI() {
            totalPointsEl.innerText = points;
            
            historyListEl.innerHTML = '';
            logs.forEach(log => {
                const li = document.createElement('li');
                li.className = 'history-item';
                const isPlus = log.amount > 0;
                li.innerHTML = `
                    <div class="hist-info">
                        <span class="hist-reason">${log.reason}</span>
                        <span class="hist-time">${log.time}</span>
                    </div>
                    <span class="hist-change ${isPlus ? 'change-plus' : 'change-minus'}">${isPlus ? '+' : ''}${log.amount}</span>
                `;
                historyListEl.appendChild(li);
            });
        }

        // 🔄 從 Google Sheets 獲取最新點數與歷史紀錄
        async function fetchFromCloud() {
            showLoading(true);
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    let total = 0;
                    let cloudLogs = [];
                    
                    data.reverse().forEach(row => {
                        const amt = parseInt(row.amount) || 0;
                        total += amt;
                        cloudLogs.push({
                            time: row.time || '',
                            reason: row.reason || '',
                            amount: amt
                        });
                    });
                    
                    points = total;
                    logs = cloudLogs;
                    renderUI();
                }
            } catch (error) {
                console.error("雲端讀取失敗:", error);
            } finally {
                showLoading(false);
            }
        }

        // 網頁開啟時自動同步
        fetchFromCloud();
    </script>
</body>
</html>
